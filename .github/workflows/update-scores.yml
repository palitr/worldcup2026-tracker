name: Update WC2026 Scores
# Runs every 30 minutes during tournament (Jun 11 - Jul 19)
on:
  schedule:
    - cron: '*/30 * 11-30 6 *'   # Jun 11–30, every 30 mins
    - cron: '*/30 * 1-19  7 *'   # Jul 1–19,  every 30 mins

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-scores:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch latest scores
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python update_scores.py

      - name: Commit scores.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scores.json heartbeat.json
          if git diff --staged --quiet; then
            echo "No changes to scores.json — skipping commit"
          else
            git commit -m "chore: update scores $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
